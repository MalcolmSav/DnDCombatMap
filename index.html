<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D&D Combat Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#c9a84c;--gold-dim:#8a6a20;--blood:#8b1a1a;--blood-bright:#c0392b;
  --dark:#0d0d0f;--dark2:#141418;--dark3:#1c1c22;--dark4:#252530;
  --text:#e8dfc8;--text-dim:#a09070;--border:#2e2a22;
  --monster:#6b2e2e;--monster-bright:#a84040;
  --cell:40px;
}
html,body{height:100%;overflow:hidden;background:var(--dark);color:var(--text);font-family:'Crimson Pro',serif}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--dark2);border-bottom:1px solid var(--gold-dim);
  flex-shrink:0;z-index:10;
}
#topbar h1{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:1px}
.top-right{display:flex;align-items:center;gap:8px}
#round-info{font-family:'Cinzel',serif;font-size:11px;color:var(--text-dim);text-align:right}
#round-info span{color:var(--gold);font-size:14px;display:block}

.dm-toggle{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:9px;color:var(--text-dim);
  padding:3px 8px;border:1px solid var(--border);border-radius:4px;
  user-select:none;
}
.dm-toggle.active{border-color:var(--blood-bright);color:var(--blood-bright);background:rgba(168,64,64,.1)}
.dm-toggle .eye{font-size:12px}

#map-container{
  flex:1;position:relative;overflow:hidden;background:#0a0a0c;
  touch-action:none;cursor:grab;
}
#map-container:active{cursor:grabbing}
#map-viewport{position:absolute;top:0;left:0;transform-origin:0 0}
#map-img{display:block;image-rendering:pixelated}
#grid-canvas{position:absolute;top:0;left:0;pointer-events:none}
.token{
  position:absolute;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  border:2px solid rgba(255,255,255,0.3);cursor:grab;
  user-select:none;touch-action:none;transition:box-shadow .1s;
  z-index:5;
}
.token:active{cursor:grabbing;box-shadow:0 0 0 3px var(--gold)}
.token.dead{filter:grayscale(1) brightness(.4)}
.token.selected{box-shadow:0 0 0 3px var(--gold),0 0 12px var(--gold)}
.token.monster-token{border-style:dashed}
.token-hp{
  position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  font-size:8px;font-family:'Cinzel',serif;white-space:nowrap;
  color:#fff;background:rgba(0,0,0,.7);padding:1px 3px;border-radius:3px;pointer-events:none;
}
.token-dead-icon{position:absolute;font-size:18px;pointer-events:none}

#dm-controls{
  display:flex;align-items:center;gap:6px;padding:6px 10px;
  background:var(--dark3);border-top:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;
}
.dm-btn{
  font-family:'Cinzel',serif;font-size:10px;padding:5px 10px;
  border:1px solid var(--gold-dim);background:transparent;color:var(--gold);
  border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:.5px;
}
.dm-btn:active{background:rgba(201,168,76,.15)}
.dm-btn.danger{border-color:var(--blood-bright);color:var(--blood-bright)}
.dm-btn.monster-btn{border-color:var(--monster-bright);color:var(--monster-bright)}
#file-input{display:none}
#initiative-list{font-size:10px;color:var(--text-dim);font-family:'Cinzel',serif;flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

#cards-area{
  flex-shrink:0;background:var(--dark2);
  border-top:1px solid var(--gold-dim);overflow-x:auto;overflow-y:hidden;
  display:flex;align-items:stretch;padding:8px;gap:8px;
  scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent;
  min-height:130px;max-height:140px;
}
.char-card{
  min-width:100px;max-width:110px;flex-shrink:0;
  background:var(--dark4);border:1px solid var(--border);border-radius:6px;
  padding:8px;display:flex;flex-direction:column;gap:3px;
  transition:border-color .2s;position:relative;overflow:hidden;
}
.char-card.active-turn{border-color:var(--gold);box-shadow:inset 0 0 8px rgba(201,168,76,.1)}
.char-card.dead-card{opacity:.5}
.char-card.monster-card{border-color:var(--monster);background:linear-gradient(135deg,var(--dark4) 80%,rgba(107,46,46,.15))}
.card-top{display:flex;align-items:center;gap:6px}
.card-avatar{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.2);
}
.card-name{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--gold);line-height:1.1;word-break:break-word}
.card-class{font-size:8px;color:var(--text-dim)}
.card-name.monster-name{color:var(--monster-bright)}
.hp-label{font-size:8px;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:.3px}
.hp-bar-bg{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.hp-bar{height:100%;border-radius:3px;transition:width .3s,background .3s}
.hp-text{font-size:9px;font-weight:600;color:var(--text);font-family:'Cinzel',serif}
.hp-hidden{font-size:9px;color:var(--text-dim);font-family:'Cinzel',serif;font-style:italic;letter-spacing:1px}
.hp-controls{display:flex;gap:3px;align-items:center;margin-top:1px}
.hp-btn{
  width:20px;height:20px;border-radius:4px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:13px;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.hp-btn.minus{border-color:var(--blood);color:var(--blood-bright)}
.hp-btn.plus{border-color:#2d6a2d;color:#4caf50}
.hp-btn:active{opacity:.6}
.hp-quick-input{
  width:32px;height:20px;background:var(--dark3);border:1px solid var(--border);
  color:var(--text);font-size:10px;text-align:center;border-radius:4px;
  font-family:'Crimson Pro',serif;
}
.turn-badge{
  position:absolute;top:3px;right:3px;font-size:7px;font-family:'Cinzel',serif;
  background:var(--gold);color:#1a1200;padding:1px 4px;border-radius:2px;letter-spacing:.3px;
}
.remove-monster-btn{
  position:absolute;top:2px;left:2px;width:14px;height:14px;
  border-radius:50%;border:1px solid var(--blood);background:transparent;
  color:var(--blood-bright);font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.remove-monster-btn:active{opacity:.5}
.card-divider{
  width:2px;flex-shrink:0;background:var(--gold-dim);border-radius:1px;
  align-self:stretch;margin:4px 2px;opacity:.5;
}

.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal{
  background:var(--dark3);border:1px solid var(--gold-dim);border-radius:8px;
  padding:20px;max-width:320px;width:100%;max-height:80vh;overflow-y:auto;
}
.modal h2{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:16px;letter-spacing:1px}
.modal h2.monster-title{color:var(--monster-bright)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;font-family:'Cinzel',serif}
.field input,.field select{
  width:100%;background:var(--dark4);border:1px solid var(--border);
  color:var(--text);padding:8px 10px;border-radius:4px;font-family:'Crimson Pro',serif;font-size:14px;
}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btn{
  flex:1;padding:10px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;
  border:1px solid;border-radius:4px;cursor:pointer;background:transparent;
}
.modal-btn.confirm{border-color:var(--gold);color:var(--gold)}
.modal-btn.monster-confirm{border-color:var(--monster-bright);color:var(--monster-bright)}
.modal-btn.cancel{border-color:var(--border);color:var(--text-dim)}
.modal-btn:active{opacity:.7}

#upload-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  border:2px dashed var(--border);margin:16px;border-radius:8px;
}
#upload-placeholder p{font-family:'Cinzel',serif;font-size:12px;color:var(--text-dim);text-align:center;letter-spacing:.5px}

#range-overlay{position:absolute;pointer-events:none;z-index:4;border-radius:50%;border:2px solid rgba(201,168,76,.5);background:rgba(201,168,76,.06)}

#toast{
  position:fixed;bottom:160px;left:50%;transform:translateX(-50%);
  background:var(--dark4);border:1px solid var(--gold-dim);
  font-family:'Cinzel',serif;font-size:11px;color:var(--gold);
  padding:8px 16px;border-radius:20px;z-index:200;
  opacity:0;transition:opacity .3s;pointer-events:none;letter-spacing:.5px;
}
#toast.show{opacity:1}

#edit-modal{display:none}
.edit-char-row{
  display:flex;gap:6px;align-items:center;margin-bottom:8px;
  padding:8px;background:var(--dark4);border-radius:6px;border:1px solid var(--border);
}
.edit-char-row input{
  background:var(--dark3);border:1px solid var(--border);color:var(--text);
  padding:4px 6px;border-radius:4px;font-family:'Crimson Pro',serif;font-size:12px;
}
.edit-char-row input.name-input{flex:1;min-width:0}
.edit-char-row input.hp-input{width:48px;text-align:center}
.edit-char-row input.speed-input{width:42px;text-align:center}
.edit-char-row select{
  background:var(--dark3);border:1px solid var(--border);color:var(--text);
  padding:4px 2px;border-radius:4px;font-size:11px;
}
.edit-label{font-size:8px;color:var(--text-dim);font-family:'Cinzel',serif;display:block;margin-bottom:2px;letter-spacing:.3px}

#monster-modal{display:none}

/* GRID CALIBRATION */
#grid-calib{
  display:none;flex-shrink:0;background:rgba(0,255,200,.05);
  border-top:1px solid rgba(0,255,200,.3);border-bottom:1px solid rgba(0,255,200,.3);
  padding:8px 10px;gap:10px;align-items:center;flex-wrap:wrap;
}
.calib-group{display:flex;align-items:center;gap:4px}
.calib-label{font-family:'Cinzel',serif;font-size:9px;color:rgba(0,255,200,.8);letter-spacing:.3px;white-space:nowrap}
.calib-slider{
  width:100px;height:6px;-webkit-appearance:none;appearance:none;
  background:rgba(0,255,200,.2);border-radius:3px;outline:none;
}
.calib-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:#00ffc8;cursor:pointer;border:2px solid var(--dark);
}
.calib-val{font-family:'Cinzel',serif;font-size:11px;color:#00ffc8;min-width:24px;text-align:center;font-weight:700}
.nudge-btn{
  width:26px;height:26px;border-radius:4px;border:1px solid rgba(0,255,200,.4);
  background:transparent;color:#00ffc8;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:monospace;
}
.nudge-btn:active{background:rgba(0,255,200,.15)}
.monster-emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:12px}
.emoji-pick{
  width:100%;aspect-ratio:1;border:1px solid var(--border);border-radius:4px;
  background:transparent;font-size:18px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;
}
.emoji-pick:active,.emoji-pick.sel{border-color:var(--monster-bright);background:rgba(168,64,64,.15)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>⚔ COMBAT</h1>
    <div class="top-right">
      <button class="dm-btn" onclick="showEditModal()" style="font-size:9px;padding:3px 8px">Edit Party</button>
      <div class="dm-toggle" id="dm-toggle" onclick="toggleDmMode()">
        <span class="eye">👁</span> DM
      </div>
      <div id="round-info">Round<span id="round-num">1</span></div>
    </div>
  </div>

  <div id="map-container">
    <div id="upload-placeholder">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M24 8v24M14 22l10-14 10 14" stroke="#8a6a20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 36h32" stroke="#8a6a20" stroke-width="2" stroke-linecap="round"/></svg>
      <p>DM: tap "Upload Map"<br>to load the battle map</p>
    </div>
    <div id="map-viewport">
      <img id="map-img" style="display:none">
      <canvas id="grid-canvas"></canvas>
      <div id="range-overlay" style="display:none"></div>
    </div>
  </div>

  <div id="dm-controls">
    <button class="dm-btn" onclick="document.getElementById('file-input').click()">Upload Map</button>
    <input type="file" id="file-input" accept="image/*">
    <button class="dm-btn monster-btn" onclick="showMonsterModal()">+ Monster</button>
    <button class="dm-btn" onclick="nextTurn()">Next Turn</button>
    <button class="dm-btn" onclick="nextRound()">End Round</button>
    <button class="dm-btn danger" onclick="clearMap()">Clear</button>
    <button class="dm-btn" id="grid-btn" onclick="toggleCalib()">Grid</button>
    <button class="dm-btn" onclick="saveSession()" style="border-color:#5a9;color:#5a9">Save</button>
    <button class="dm-btn" onclick="document.getElementById('load-input').click()" style="border-color:#5a9;color:#5a9">Load</button>
    <input type="file" id="load-input" accept=".json" style="display:none">
    <div id="initiative-list"></div>
  </div>

  <div id="grid-calib" style="display:none">
    <div class="calib-group">
      <span class="calib-label">W</span>
      <input type="range" class="calib-slider" id="cellw-slider" min="15" max="100" value="40" oninput="setCellW(this.value)">
      <span class="calib-val" id="cellw-val">40</span>
    </div>
    <div class="calib-group">
      <span class="calib-label">H</span>
      <input type="range" class="calib-slider" id="cellh-slider" min="15" max="100" value="40" oninput="setCellH(this.value)">
      <span class="calib-val" id="cellh-val">40</span>
    </div>
    <div class="calib-group">
      <span class="calib-label">X</span>
      <button class="nudge-btn" onclick="nudgeGrid('x',-1)">◀</button>
      <button class="nudge-btn" onclick="nudgeGrid('x',1)">▶</button>
    </div>
    <div class="calib-group">
      <span class="calib-label">Y</span>
      <button class="nudge-btn" onclick="nudgeGrid('y',-1)">▲</button>
      <button class="nudge-btn" onclick="nudgeGrid('y',1)">▼</button>
    </div>
    <button class="dm-btn" onclick="toggleCalib()" style="font-size:9px;padding:4px 10px;border-color:rgba(0,255,200,.5);color:#00ffc8">Done</button>
  </div>

  <div id="cards-area"></div>
</div>

<div id="toast"></div>

<div id="edit-modal" class="modal-bg" onclick="if(event.target===this)closeEditModal()">
  <div class="modal" style="max-width:360px">
    <h2>Edit Party</h2>
    <div id="edit-chars-list"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeEditModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="saveEdits()">Save</button>
    </div>
  </div>
</div>

<div id="monster-modal" class="modal-bg" onclick="if(event.target===this)closeMonsterModal()">
  <div class="modal">
    <h2 class="monster-title">Add Monster</h2>
    <div class="field">
      <label>Name</label>
      <input id="mon-name" placeholder="Goblin, Dragon, etc.">
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="monster-emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>HP</label>
        <input id="mon-hp" type="number" value="15" min="1">
      </div>
      <div class="field">
        <label>Speed (ft)</label>
        <input id="mon-speed" type="number" value="30" step="5" min="5">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>AC</label>
        <input id="mon-ac" type="number" value="13" min="1">
      </div>
      <div class="field">
        <label>Count</label>
        <input id="mon-count" type="number" value="1" min="1" max="12">
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeMonsterModal()">Cancel</button>
      <button class="modal-btn monster-confirm" onclick="addMonsters()">Add</button>
    </div>
  </div>
</div>

<script>
let cellW = 40, cellH = 40;
let gridOffX = 0, gridOffY = 0;
const COLORS = ['#4a7fa5','#7a4a9e','#4a9e5a','#c07820','#9e4a4a'];
const MONSTER_COLORS = ['#8b3a3a','#6b4a8a','#3a6b5a','#8a6b2a','#5a3a6b','#3a5a8b','#8b5a3a','#4a7a5a','#7a3a5a','#5a8a3a','#3a4a7a','#7a6a3a'];
const CLASSES = ['Fighter','Wizard','Ranger','Barbarian','Rogue','Cleric','Paladin','Warlock','Bard','Druid','Monk','Sorcerer'];
const EMOJIS = ['⚔️','🔮','🏹','🪓','🗡️','✝️','🛡️','👁️','🎵','🌿','👊','⚡'];
const MONSTER_EMOJIS = ['👹','🐉','💀','🧟','👻','🕷️','🐺','🦇','🐍','🧌','👿','🔥','🦑','🐊','🪱','🦂','🐗','🦎'];

let characters = [
  {id:0,name:'Aragorn',cls:'Fighter',emoji:'⚔️',color:COLORS[0],hp:45,maxHp:45,speed:30,x:3,y:3,isMonster:false},
  {id:1,name:'Gandalf',cls:'Wizard',emoji:'🔮',color:COLORS[1],hp:28,maxHp:28,speed:30,x:5,y:3,isMonster:false},
  {id:2,name:'Legolas',cls:'Ranger',emoji:'🏹',color:COLORS[2],hp:38,maxHp:38,speed:35,x:7,y:3,isMonster:false},
  {id:3,name:'Gimli',cls:'Barbarian',emoji:'🪓',color:COLORS[3],hp:52,maxHp:52,speed:25,x:4,y:5,isMonster:false},
  {id:4,name:'Frodo',cls:'Rogue',emoji:'🗡️',color:COLORS[4],hp:22,maxHp:22,speed:30,x:6,y:5,isMonster:false},
];

let nextId = 100;
let round = 1;
let turnIdx = 0;
let mapLoaded = false;
let mapNaturalW = 800, mapNaturalH = 600;
let viewScale = 1, viewX = 0, viewY = 0;
let panStart = null;
let draggingId = null;
let selectedId = null;
let dmMode = false;
let calibrating = false;
let selectedMonsterEmoji = '👹';

function getClassEmoji(cls){
  const idx = CLASSES.indexOf(cls);
  return idx >= 0 ? EMOJIS[idx] : '⚔️';
}
function hpColor(hp, max){
  const r = hp/max;
  if(r > .5) return '#4caf50';
  if(r > .25) return '#e6a817';
  return '#c0392b';
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'),2000);
}

// DM MODE
function toggleDmMode(){
  dmMode = !dmMode;
  document.getElementById('dm-toggle').classList.toggle('active', dmMode);
  renderCards();
  renderTokens();
  toast(dmMode ? 'DM view — monster stats visible' : 'Player view — monster stats hidden');
}

// MONSTER MODAL
function showMonsterModal(){
  document.getElementById('monster-modal').style.display = 'flex';
  document.getElementById('mon-name').value = '';
  document.getElementById('mon-hp').value = '15';
  document.getElementById('mon-speed').value = '30';
  document.getElementById('mon-ac').value = '13';
  document.getElementById('mon-count').value = '1';
  selectedMonsterEmoji = '👹';
  renderEmojiGrid();
}
function closeMonsterModal(){
  document.getElementById('monster-modal').style.display = 'none';
}
function renderEmojiGrid(){
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  MONSTER_EMOJIS.forEach(em=>{
    const btn = document.createElement('button');
    btn.className = 'emoji-pick' + (em===selectedMonsterEmoji?' sel':'');
    btn.textContent = em;
    btn.onclick = ()=>{ selectedMonsterEmoji = em; renderEmojiGrid(); };
    grid.appendChild(btn);
  });
}
function addMonsters(){
  const name = document.getElementById('mon-name').value.trim() || 'Monster';
  const hp = Math.max(1, parseInt(document.getElementById('mon-hp').value)||15);
  const speed = Math.max(5, parseInt(document.getElementById('mon-speed').value)||30);
  const ac = Math.max(1, parseInt(document.getElementById('mon-ac').value)||13);
  const count = Math.max(1, Math.min(12, parseInt(document.getElementById('mon-count').value)||1));

  for(let i=0; i<count; i++){
    const label = count > 1 ? `${name} ${i+1}` : name;
    const colorIdx = (nextId - 100) % MONSTER_COLORS.length;
    characters.push({
      id: nextId++,
      name: label,
      cls: `AC ${ac}`,
      emoji: selectedMonsterEmoji,
      color: MONSTER_COLORS[colorIdx],
      hp: hp,
      maxHp: hp,
      speed: speed,
      ac: ac,
      x: 10 + i % 4,
      y: 10 + Math.floor(i / 4),
      isMonster: true,
    });
  }
  closeMonsterModal();
  renderCards();
  renderTokens();
  toast(`${count > 1 ? count + ' ' : ''}${name} added!`);
}

function removeMonster(id){
  const idx = characters.findIndex(c=>c.id===id);
  if(idx < 0) return;
  const name = characters[idx].name;
  characters.splice(idx, 1);
  if(turnIdx >= characters.length) turnIdx = 0;
  if(selectedId === id) selectedId = null;
  renderCards();
  renderTokens();
  toast(`${name} removed`);
}

// CARDS
function renderCards(){
  const area = document.getElementById('cards-area');
  area.innerHTML = '';
  const pList = characters.filter(c=>!c.isMonster);
  const mList = characters.filter(c=>c.isMonster);

  pList.forEach(c=> area.appendChild(buildCard(c)));

  if(mList.length > 0){
    const div = document.createElement('div');
    div.className = 'card-divider';
    area.appendChild(div);
    mList.forEach(c=> area.appendChild(buildCard(c)));
  }
  renderInitiative();
}

function buildCard(c){
  const allIdx = characters.indexOf(c);
  const isTurn = allIdx === turnIdx;
  const div = document.createElement('div');
  div.className = 'char-card'
    + (isTurn ? ' active-turn' : '')
    + (c.hp<=0 ? ' dead-card' : '')
    + (c.isMonster ? ' monster-card' : '');

  const hpPct = Math.max(0, c.hp/c.maxHp*100);
  const lowHp = c.hp > 0 && c.hp/c.maxHp < 0.25;
  const showHp = !c.isMonster || dmMode;

  let hpSection = '';
  if(showHp){
    hpSection = `
      <div class="hp-label">HP</div>
      <div class="hp-bar-bg"><div class="hp-bar" style="width:${hpPct}%;background:${hpColor(c.hp,c.maxHp)};${lowHp?'animation:pulse 1s infinite':''}"></div></div>
      <div class="hp-text">${c.hp} / ${c.maxHp}</div>
      <div class="hp-controls">
        <button class="hp-btn minus" onclick="changeHp(${c.id},-1)">−</button>
        <input class="hp-quick-input" type="number" value="1" min="1" max="999" id="hpamt-${c.id}">
        <button class="hp-btn plus" onclick="changeHp(${c.id},1)">+</button>
      </div>`;
  } else {
    hpSection = `
      <div class="hp-label">HP</div>
      <div class="hp-bar-bg"><div class="hp-bar" style="width:100%;background:var(--monster-bright);opacity:.4"></div></div>
      <div class="hp-hidden">???</div>`;
  }

  div.innerHTML = `
    ${isTurn ? '<div class="turn-badge">TURN</div>' : ''}
    ${c.isMonster && dmMode ? `<button class="remove-monster-btn" onclick="event.stopPropagation();removeMonster(${c.id})">✕</button>` : ''}
    <div class="card-top">
      <div class="card-avatar" style="background:${c.color}22;border-color:${c.color}66">${c.emoji}</div>
      <div>
        <div class="card-name ${c.isMonster?'monster-name':''}">${c.name}</div>
        <div class="card-class">${c.isMonster && !dmMode ? 'Monster' : c.cls}</div>
      </div>
    </div>
    ${hpSection}
  `;

  div.addEventListener('click', (e)=>{
    if(e.target.closest('.hp-btn') || e.target.closest('.hp-quick-input') || e.target.closest('.remove-monster-btn')) return;
    selectedId = c.id;
    renderCards();
    renderTokens();
  });
  return div;
}

function renderInitiative(){
  const el = document.getElementById('initiative-list');
  const names = characters.map((c,i)=>{
    const n = c.isMonster && !dmMode ? '???' : c.name;
    return i===turnIdx ? `<b style="color:var(--gold)">${n}</b>` : n;
  });
  el.innerHTML = names.join(' › ');
}

function changeHp(id, dir){
  const c = characters.find(x=>x.id===id);
  if(!c) return;
  if(c.isMonster && !dmMode) return;
  const inp = document.getElementById('hpamt-'+id);
  const amt = parseInt(inp?.value)||1;
  c.hp = Math.max(0, Math.min(c.maxHp, c.hp + dir*amt));
  renderCards();
  renderTokens();
  if(c.hp===0) toast(`${c.name} is down!`);
}

function nextTurn(){
  if(characters.length === 0) return;
  turnIdx = (turnIdx+1) % characters.length;
  const c = characters[turnIdx];
  selectedId = c.id;
  renderCards();
  renderTokens();
  const name = c.isMonster && !dmMode ? '???' : c.name;
  toast(`${name}'s turn`);
}
function nextRound(){
  round++;
  turnIdx = 0;
  document.getElementById('round-num').textContent = round;
  renderCards();
  toast(`Round ${round} begins!`);
}
function clearMap(){
  document.getElementById('map-img').style.display='none';
  document.getElementById('upload-placeholder').style.display='flex';
  document.getElementById('grid-canvas').style.display='none';
  document.querySelector('#map-viewport').querySelectorAll('.token').forEach(t=>t.remove());
  mapLoaded = false;
}

// MAP
document.getElementById('file-input').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = document.getElementById('map-img');
    img.onload = ()=>{
      mapNaturalW = img.naturalWidth;
      mapNaturalH = img.naturalHeight;
      const mc = document.getElementById('map-container');
      const mw = mc.clientWidth, mh = mc.clientHeight;
      viewScale = Math.min(mw/mapNaturalW, mh/mapNaturalH, 1);
      viewX = (mw - mapNaturalW*viewScale)/2;
      viewY = (mh - mapNaturalH*viewScale)/2;
      img.style.width = mapNaturalW+'px';
      img.style.height = mapNaturalH+'px';
      img.style.display = 'block';
      document.getElementById('upload-placeholder').style.display='none';
      gridOffX = 0; gridOffY = 0;
      document.getElementById('cellw-slider').value = cellW;
      document.getElementById('cellw-val').textContent = cellW;
      document.getElementById('cellh-slider').value = cellH;
      document.getElementById('cellh-val').textContent = cellH;
      drawGrid();
      mapLoaded = true;
      applyTransform();
      renderTokens();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
  e.target.value='';
});

function applyTransform(){
  document.getElementById('map-viewport').style.transform = `translate(${viewX}px,${viewY}px) scale(${viewScale})`;
}
function drawGrid(){
  const canvas = document.getElementById('grid-canvas');
  canvas.width = mapNaturalW; canvas.height = mapNaturalH;
  canvas.style.width = mapNaturalW+'px'; canvas.style.height = mapNaturalH+'px';
  canvas.style.display='block';
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(calibrating){
    ctx.strokeStyle = 'rgba(0,255,200,0.7)';
    ctx.lineWidth = 1.5;
  } else {
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = .6;
  }
  const cols = Math.ceil((mapNaturalW-gridOffX)/cellW)+1;
  const rows = Math.ceil((mapNaturalH-gridOffY)/cellH)+1;
  for(let i=0;i<=cols;i++){const x=gridOffX+i*cellW;if(x<0)continue;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()}
  for(let j=0;j<=rows;j++){const y=gridOffY+j*cellH;if(y<0)continue;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}
}

// TOKENS
function renderTokens(){
  const vp = document.getElementById('map-viewport');
  vp.querySelectorAll('.token').forEach(t=>t.remove());
  characters.forEach(c=>{
    const px = gridOffX + c.x*cellW + cellW/2 - 18;
    const py = gridOffY + c.y*cellH + cellH/2 - 18;
    const div = document.createElement('div');
    div.className = 'token'
      + (c.hp<=0?' dead':'')
      + (c.id===selectedId?' selected':'')
      + (c.isMonster?' monster-token':'');
    div.id = 'tok-'+c.id;
    div.style.left = px+'px'; div.style.top = py+'px';
    div.style.background = c.color+'cc';
    div.style.borderColor = c.color;
    if(calibrating){ div.style.opacity = '0.3'; div.style.cursor = 'default'; }

    const showHp = !c.isMonster || dmMode;
    const hpLabel = showHp ? `${c.hp}/${c.maxHp}` : c.name.substring(0,3);
    div.innerHTML = `<span style="font-size:16px">${c.emoji}</span>
      <div class="token-hp">${hpLabel}</div>
      ${c.hp<=0?'<div class="token-dead-icon">💀</div>':''}`;
    attachTokenDrag(div, c.id);
    vp.appendChild(div);
  });
  updateRangeOverlay();
}

function updateRangeOverlay(){
  const ov = document.getElementById('range-overlay');
  if(selectedId===null){ov.style.display='none';return;}
  const c = characters.find(x=>x.id===selectedId);
  if(!c){ov.style.display='none';return;}
  const showRange = !c.isMonster || dmMode;
  if(!showRange){ov.style.display='none';return;}
  const cells = c.speed/5;
  const rx = cells*cellW;
  const ry = cells*cellH;
  const cx = gridOffX + c.x*cellW+cellW/2;
  const cy = gridOffY + c.y*cellH+cellH/2;
  ov.style.display='block';
  ov.style.width = rx*2+'px'; ov.style.height = ry*2+'px';
  ov.style.left = (cx-rx)+'px'; ov.style.top = (cy-ry)+'px';
}

function attachTokenDrag(el, id){
  let startX,startY,startCX,startCY,moved;
  function onStart(ex,ey){
    if(calibrating) return;
    moved=false; startX=ex; startY=ey;
    const c=characters.find(x=>x.id===id);
    startCX=c.x; startCY=c.y;
    selectedId=id; draggingId=id;
    renderTokens();
  }
  function onMove(ex,ey){
    if(draggingId!==id) return;
    const dx=ex-startX, dy=ey-startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
    if(!moved) return;
    const c=characters.find(x=>x.id===id);
    c.x=Math.max(0,Math.round(startCX+(dx/viewScale)/cellW));
    c.y=Math.max(0,Math.round(startCY+(dy/viewScale)/cellH));
    const tok=document.getElementById('tok-'+id);
    if(tok){
      tok.style.left=(gridOffX+c.x*cellW+cellW/2-18)+'px';
      tok.style.top=(gridOffY+c.y*cellH+cellH/2-18)+'px';
    }
    updateRangeOverlay();
  }
  function onEnd(){ draggingId=null; renderTokens(); renderCards(); }
  el.addEventListener('touchstart',e=>{e.stopPropagation();const t=e.touches[0];onStart(t.clientX,t.clientY)},{passive:true});
  el.addEventListener('touchmove',e=>{e.preventDefault();e.stopPropagation();const t=e.touches[0];onMove(t.clientX,t.clientY)},{passive:false});
  el.addEventListener('touchend',e=>{e.stopPropagation();onEnd()});
  el.addEventListener('mousedown',e=>{e.stopPropagation();onStart(e.clientX,e.clientY)});
  window.addEventListener('mousemove',e=>{if(draggingId===id)onMove(e.clientX,e.clientY)});
  window.addEventListener('mouseup',()=>{if(draggingId===id)onEnd()});
}

// PAN & PINCH
const mc = document.getElementById('map-container');
let lastDist=null, pinchStart=null;
mc.addEventListener('touchstart', e=>{
  if(e.touches.length===1 && draggingId===null){
    panStart={x:e.touches[0].clientX-viewX, y:e.touches[0].clientY-viewY};
  } else if(e.touches.length===2){
    panStart=null;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    lastDist=Math.hypot(dx,dy);
    pinchStart={scale:viewScale};
  }
},{passive:true});
mc.addEventListener('touchmove', e=>{
  if(e.touches.length===1 && panStart && draggingId===null){
    viewX=e.touches[0].clientX-panStart.x;
    viewY=e.touches[0].clientY-panStart.y;
    applyTransform();
  } else if(e.touches.length===2 && pinchStart){
    e.preventDefault();
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.hypot(dx,dy);
    viewScale=Math.max(0.2,Math.min(4,pinchStart.scale*(dist/lastDist)));
    applyTransform();
  }
},{passive:false});
mc.addEventListener('touchend',()=>{panStart=null;lastDist=null;pinchStart=null});
mc.addEventListener('mousedown',e=>{if(draggingId!==null)return;panStart={x:e.clientX-viewX,y:e.clientY-viewY}});
window.addEventListener('mousemove',e=>{if(panStart&&draggingId===null){viewX=e.clientX-panStart.x;viewY=e.clientY-panStart.y;applyTransform()}});
window.addEventListener('mouseup',()=>{panStart=null});
mc.addEventListener('wheel',e=>{e.preventDefault();viewScale=Math.max(0.2,Math.min(4,viewScale*(e.deltaY>0?0.9:1.1)));applyTransform()},{passive:false});

// EDIT PARTY
function showEditModal(){
  const list = document.getElementById('edit-chars-list');
  list.innerHTML = '';
  characters.filter(c=>!c.isMonster).forEach(c=>{
    const row = document.createElement('div');
    row.className = 'edit-char-row';
    row.innerHTML = `
      <div style="flex:1;min-width:0">
        <span class="edit-label">Name</span>
        <input class="name-input" value="${c.name}" data-id="${c.id}" data-field="name">
      </div>
      <div>
        <span class="edit-label">Class</span>
        <select data-id="${c.id}" data-field="cls">
          ${CLASSES.map(cl=>`<option value="${cl}" ${cl===c.cls?'selected':''}>${cl}</option>`).join('')}
        </select>
      </div>
      <div>
        <span class="edit-label">Max HP</span>
        <input class="hp-input" type="number" value="${c.maxHp}" data-id="${c.id}" data-field="maxHp">
      </div>
      <div>
        <span class="edit-label">Speed</span>
        <input class="speed-input" type="number" value="${c.speed}" step="5" data-id="${c.id}" data-field="speed">
      </div>`;
    list.appendChild(row);
  });
  document.getElementById('edit-modal').style.display = 'flex';
}
function closeEditModal(){ document.getElementById('edit-modal').style.display = 'none'; }
function saveEdits(){
  document.querySelectorAll('#edit-chars-list input, #edit-chars-list select').forEach(el=>{
    const id = parseInt(el.dataset.id);
    const c = characters.find(x=>x.id===id);
    if(!c) return;
    const field = el.dataset.field;
    if(field==='name') c.name = el.value || 'Hero';
    if(field==='cls'){ c.cls = el.value; c.emoji = getClassEmoji(el.value); }
    if(field==='maxHp'){ const v=Math.max(1,parseInt(el.value)||1); c.maxHp=v; c.hp=Math.min(c.hp,v); }
    if(field==='speed') c.speed = Math.max(5, parseInt(el.value)||30);
  });
  closeEditModal();
  renderCards();
  renderTokens();
  toast('Party updated!');
}

// GRID CALIBRATION
function toggleCalib(){
  const el = document.getElementById('grid-calib');
  const btn = document.getElementById('grid-btn');
  if(el.style.display === 'flex'){
    el.style.display = 'none';
    calibrating = false;
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.style.background = '';
  } else {
    el.style.display = 'flex';
    calibrating = true;
    btn.style.borderColor = '#00ffc8';
    btn.style.color = '#00ffc8';
    btn.style.background = 'rgba(0,255,200,.1)';
  }
  if(mapLoaded){ drawGrid(); renderTokens(); }
}
function setCellW(val){
  cellW = parseInt(val);
  document.getElementById('cellw-val').textContent = val;
  drawGrid();
  renderTokens();
}
function setCellH(val){
  cellH = parseInt(val);
  document.getElementById('cellh-val').textContent = val;
  drawGrid();
  renderTokens();
}
function nudgeGrid(axis, dir){
  if(axis==='x') gridOffX += dir;
  else gridOffY += dir;
  drawGrid();
  renderTokens();
}

// SAVE / LOAD SESSION
function saveSession(){
  const data = {
    version: 1,
    characters: characters,
    nextId: nextId,
    round: round,
    turnIdx: turnIdx,
    cellW: cellW,
    cellH: cellH,
    gridOffX: gridOffX,
    gridOffY: gridOffY,
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  const stamp = d.toISOString().slice(0,10);
  a.download = `session-${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Session saved!');
}

document.getElementById('load-input').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.characters) throw new Error('Invalid session file');
      characters = data.characters;
      nextId = data.nextId || 100;
      round = data.round || 1;
      turnIdx = data.turnIdx || 0;
      cellW = data.cellW || 40;
      cellH = data.cellH || 40;
      gridOffX = data.gridOffX || 0;
      gridOffY = data.gridOffY || 0;
      document.getElementById('round-num').textContent = round;
      document.getElementById('cellw-slider').value = cellW;
      document.getElementById('cellw-val').textContent = cellW;
      document.getElementById('cellh-slider').value = cellH;
      document.getElementById('cellh-val').textContent = cellH;
      renderCards();
      if(mapLoaded){ drawGrid(); renderTokens(); }
      toast('Session loaded! Upload your map.');
    } catch(err){
      toast('Invalid session file');
    }
  };
  reader.readAsText(f);
  e.target.value = '';
});

// PULSE
const ps = document.createElement('style');
ps.textContent = `@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}`;
document.head.appendChild(ps);

// INIT
renderCards();
toast('Session ready — upload a map to begin');
</script>
